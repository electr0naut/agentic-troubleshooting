[timeouts]
# Default timeout for each remote command (seconds)
command_timeout_secs = 10
# Timeout for slow commands: system log queries, vmmap (seconds)
slow_command_timeout_secs = 15
# Maximum total investigation time per host before escalating (seconds)
investigation_budget_secs = 300
# SSH connection timeout (seconds)
ssh_connect_timeout_secs = 5
# Log lookback window for correlating events (minutes)
log_lookback_minutes = 10

[cpu]
# %CPU above which a process triggers the CPU investigation branch
process_high_pct = 50.0
# %CPU above which a process is flagged as saturating cores
process_critical_pct = 95.0
# Load-to-cores ratio: below this the system is healthy
load_ratio_healthy = 0.7
# Load-to-cores ratio: at or above this the system is saturating
load_ratio_saturated = 1.0
# Load-to-cores ratio: at or above this the system is severely overloaded
load_ratio_overloaded = 2.0
# Multiplier to detect load spike (1m vs 5m and 5m vs 15m)
load_spike_multiplier = 1.5
# Multiplier to detect sustained elevated load (1m vs 15m)
load_sustained_multiplier = 1.3
# Tolerance for declaring load stable (fraction of 15m average)
load_stable_tolerance = 0.2
# Tolerance for declaring sustained load (fraction of 5m average)
load_sustained_tolerance = 0.3

[memory]
# %MEM above which a process triggers the memory investigation branch
process_high_pct = 50.0
# RSS in MB above which a process gets a warning (even if %MEM is low)
process_rss_warning_mb = 100
# VSZ-to-RSS ratio above which to flag large virtual reservation
vsz_rss_ratio_warning = 10
# Minimum VSZ in MB to flag large virtual reservation (combined with ratio)
vsz_absolute_warning_mb = 1000
# Minimum %MEM for attributing system swap/compression to the process
swap_attribution_min_pct = 5.0
# System compressed memory above this (MB) triggers a note
compression_warning_mb = 2048
# Per-process swap above this (MB) triggers a warning (Linux only)
process_swap_warning_mb = 100
# Seconds between RSS growth samples
rss_sample_interval_secs = 3
# Number of RSS samples for growth detection
rss_sample_count = 3
# RSS growth percentage above which to flag a possible leak
rss_growth_warning_pct = 5.0

[io]
# Ratio of REG (regular file) FDs to total FDs above which process is I/O heavy
reg_fd_ratio_warning = 0.5
# Minimum number of REG FDs to trigger I/O-heavy warning (combined with ratio)
reg_fd_count_min = 10
# %CPU below which the I/O-bound heuristic applies
iobound_cpu_max_pct = 10.0
# Cumulative CPU time (seconds) above which low-%CPU suggests I/O waiting
iobound_cumulative_time_secs = 60
# Filesystem usage percentage above which to flag critical
disk_usage_critical_pct = 90

[fd]
# FD usage ratio (open/limit) above which to warn
usage_ratio_warning = 0.5
# FD usage ratio above which to flag critical
usage_ratio_critical = 0.8
# Number of FDs in a single directory above which to flag temp file leak
dir_fd_leak_threshold = 20
# Number of pipe/FIFO FDs above which to flag subprocess management issue
pipe_fd_warning = 20
# FD growth between samples above which to flag active leak
growth_active_leak = 5
# Seconds between FD count samples
fd_sample_interval_secs = 5
# Number of FD count samples
fd_sample_count = 3

[network]
# Total connection count above which to warn
connection_count_warning = 50
# Total connection count above which to flag critical
connection_count_critical = 200
# CLOSE_WAIT sockets above which to warn
close_wait_warning = 5
# Connections to a single remote endpoint above which to flag concentration
endpoint_concentration_warning = 10
# Max connections to display before truncating output
display_max_connections = 20

[output]
# Max processes to show in system triage top list
top_process_count = 20
# Max threads to show in thread breakdown
top_thread_count = 20
# Max regular files to show in I/O investigation
max_reg_files_shown = 30
# Max file paths to show in FD investigation
max_file_paths_shown = 10
# Max directory groupings in FD leak analysis
max_dir_groups_shown = 3
# Max log lines to display per query
max_log_lines = 20
# Max netstat lines to scan for queue depth
max_netstat_lines = 100
